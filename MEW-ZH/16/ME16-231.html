<h1>卡·马克思<br>关于国际工人协会如何对待<br>和平和自由同盟代表大会的<br>决议草案<sup>[183]</sup></h1>
<p>建议总委员会的代表不正式参加和平同盟的代表大会，并在工人协会代表大会上反对任何主张正式参加的建议。</p>
