<h1>卡·马克思<br>总委员会就费·皮阿的演说<br>所作的决议<sup>[217]</sup></h1>
<p>国际工人协会总委员会宣布对费里克斯·皮阿在克利夫兰大厅的公众集会上所发表的演说不负任何责任；费·皮阿与本协会没有任何关系。</p>
<div class="src" style="display: inline-block; width: 60%; vertical-align: top;">
