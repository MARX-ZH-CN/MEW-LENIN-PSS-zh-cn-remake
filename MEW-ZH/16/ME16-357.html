<h1>卡·马克思<br>总委员会提交布鲁塞尔代表大会的<br>关于在资本主义制度下使用<br>机器的后果的决议草案<sup>[225]</sup></h1>
<p>一方面，机器成了资本家阶级用来实行专制和进行勒索的最有力的工具，另一方面，机器生产的发展为用真正社会的生产制度代替雇佣劳动制度创造必要的物质条件。</p>
