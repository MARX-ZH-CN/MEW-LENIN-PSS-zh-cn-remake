<h1>致独立工党执行委员会<sup>[524]</sup></h1>
<p>我衷心感谢执行委员会的盛情邀请，然而我无法赴邀，因为给我治病的医生坚决反对我此刻接受任何邀请。鉴于入场券可能对别人还有用，因此我不揣冒昧，将它随信奉还。</p>
