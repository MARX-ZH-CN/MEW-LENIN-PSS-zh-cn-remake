<h1>致伦敦德意志工人<br>共产主义教育协会</h1>
<p class="rt">1894 年 12 月 6 日于伦敦西北区<br>瑞琴特公园路 41 号</p>
<p>尊敬的同志：</p>
<p>请您转达我对协会的真诚的谢意，感谢它对我的生日的友好祝贺。我希望，四年前已经纪念过成立五十周年的协会能像我这样活到七十四岁，并且到那时候它仍旧那样精神饱满，朝气蓬勃，能够再庆祝自己的一百周年。</p>
<p class="ct">致真挚的敬礼</p>
<p class="rt">您的 弗·恩格斯</p>
<table style="width: 100%; border: none;">
<tr>
<td style="width: 50%; text-align: left; vertical-align: top;">
<p>第一次用俄文发表于“马克思恩格斯全集”1946 年第 1 版第 29 卷</p>
</td>
<td style="width: 50%; text-align: right; vertical-align: top;">
<p>原文是德文<br>俄文是按手稿译的</p>
</td>
</tr>
</table>
<div class="quote">来源：《马克思恩格斯全集》，第22卷，北京：人民出版社，1965年，第589页.</div>
