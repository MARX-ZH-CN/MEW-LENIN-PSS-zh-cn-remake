<h1>卡·马克思<br>致“东邮报”编辑</h1>
<p>阁下：</p>
<p>查理·布莱德洛在 1 月 7 日的“国民改革者”<sup>[367]</sup>上写道：</p>
<p>“我们只想指出，马克思博士过去曾给他的政府提供情报。”</p>
<p>兹郑重声明：这是既荒谬又卑鄙的诽谤。我要求布莱德洛先生举出哪怕一件使他有丝毫理由说这番话的事实。为了使他安心，我补充一句，我不打算要求与他“决斗”。</p>
<p>阁下，我仍然是您的顺从的仆人</p>
<p class="rt">卡尔·马克思<br>1872 年 1 月 16 日</p>
