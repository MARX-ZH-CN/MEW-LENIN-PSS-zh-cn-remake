<h1>弗·恩格斯<br>总委员会给“旁观者”和“观察家”编辑部的信<sup>[263]</sup></h1>
<p class="ct">致“旁观者”（及“观察家”）编辑</p>
<p style="text-indent: 0;">阁下：</p>
<p>如果您公布这一事实，即目前充斥于英国报刊的巴黎的一切假宣言和“国际”的其他出版物（它们首先刊载于臭名远扬的“巴黎报”）无例外地都是凡尔赛的警察捏造的，国际工人协会总委员会将十分感激。</p>
<p>此致</p>
<p style="text-indent: 0;">敬礼</p>
<table class="src">
<tr>
<td>弗·恩格斯写于 1871 年 6 月 21 日<br>
左右<br>

<td>原文是英文<br>
俄文是按草稿译的</td>
</tr>
</table>
<div class="quote">来源：《马克思恩格斯全集》，第17卷，北京：人民出版社，1963年，第400页.</div>
