<h1>卡·马克思<br>致“舆论”周报编辑<sup>[283]</sup></h1>
<p>私人信件</p>
<p style="text-indent: 0;">阁下：</p>
<p>我不仅要求您在贵报立刻发表随信附上的答复<sup><a href="#F1" id="ZF1">1</a></sup>，而且坚决要求您在贵报刊登过诽谤言论的同一地方刊登<b>详尽而彻底的辟谣声明</b>。</p>
<p>如果我不得不对贵报诉诸法律，我将感到非常遗憾。</p>
<p class="rt">您的顺从的仆人 卡·马·</p>
<table class="src">
<tr>
<td>写于 1871 年 8 月 19 日<br>
第一次用俄文发表于“马克思恩格斯全集”1931 年第 1 版第 24 卷</td>
<td>原文是英文<br>
俄文是按草稿译的</td>
</tr>
</table>
