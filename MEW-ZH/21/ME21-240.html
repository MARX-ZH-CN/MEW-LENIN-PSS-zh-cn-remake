<h1>致“北方通报”杂志编辑部<sup><a href="#F1" id="ZF1">1</a></sup></h1>
<p class="rt">1885 年 8 月 25 日于泽稷</p>
<p style="text-indent: 0;">阁下：</p>
<p>我在亡友卡尔·马克思的文稿中发现对米海洛夫斯基先生“卡尔·马克思在茹柯夫斯基先生的法庭上”一文的答复。这一答复不知当时为什么没有发表，由于目前仍然可能引起俄国读者的兴趣，特寄上请您处理。</p>
<p>请接受我的致意</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<p class="fni"><a href="#ZF1" id="F1">1</a> 第一次用俄文发表于“马克思恩格斯全集”1946 年第 1 版第 29 卷<br>原文是法文<br>俄文是按手稿译的</p>
</aside>
<div class="quote">来源：《马克思恩格斯全集》，第21卷，北京：人民出版社，1965年，第240页.</div>
