<h1>弗·恩格斯<br>致萨拉哥沙代表大会</h1>
<p class="rt">1872 年 4 月 6 日于伦敦</p>
<p>总委员会和不列颠联合会委员会谨向萨拉哥沙代表大会表示祝贺。</p>
<p>无产阶级解放万岁！</p>
<p class="rt">恩格斯</p>
