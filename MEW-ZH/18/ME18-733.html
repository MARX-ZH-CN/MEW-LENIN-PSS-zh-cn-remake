<h1>纽约总委员会发给<br>弗·恩格斯的委托书</h1>
<p class="ct">国际工人协会总委员会</p>
<p class="ct">委托书</p>
<p>兹委派弗里德里希·恩格斯(现住伦敦瑞琴特公园路 122 号)为国际工人协会总委员会负责意大利事务的临时代表。授权并责成他根据随时接到的指示代表总委员会进行活动。</p>
<p class="ct">根据总委员会的指示并代表总委员会</p>
<p class="rt">总书记 弗·阿·左尔格</p>
<p class="rt">1873 年 1 月 5 日于纽约</p>
