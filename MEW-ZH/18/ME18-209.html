<h1>弗·恩格斯<br>致洛迪下伦巴第工农协会<br>（国际支部）<sup>[201]</sup></h1>
<p class="rt">1872 年 11 月 13 日于伦敦</p>
<p>公民们！</p>
<p>我非常高兴地得知，你们建立了一个国际支部。我立即把这件事情通知了纽约的新总委员会。在这封信的末尾，我把同总委员会直接联系的地址告诉你们，同时我随时准备为你们提供一切消息，或者做你们希望我做的其他任何事情。</p>
<p>敬礼和兄弟情谊</p>
<p class="rt">弗里德里希·恩格斯</p>
