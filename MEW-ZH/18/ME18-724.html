<h1>卡·马克思关于巴里的代表资格证的发言记录<sup>[481]</sup></h1>
<p class="ct">摘自国际工人协会海牙代表大会</p>
<p class="ct">1872 年 9 月 3 日会议记录</p>
<p>马克思说，某个支部选举什么人，这谁也管不着。不过，如果巴里不是所谓的英国工人领袖之一，这是他的荣幸，因为这些人或多或少都被资产阶级和政府收买了。巴里遭到攻击，只是因为他不愿意充当黑尔斯的工具。</p>
