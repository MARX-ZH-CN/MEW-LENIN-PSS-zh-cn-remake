<h1>50<br>
马克思致恩格斯</h1>
<p class="ct">曼彻斯特</p>
<p class="add"><b>1858年3月2日[于伦敦]</b></p>
<br><p>　　亲爱的弗雷德里克：</p>
<p>　　……再者，你能否告诉我，你们隔多少时间——例如在你们的工厂——更新一次机器设备？拜比吉断言，在曼彻斯特大多数机器设备平均每隔五年更新一次。<sup><a href="#bz1" id="bzref1">(1)</a></sup>这种说法在我看来有点奇怪，不太可信。机器设备更新的平均时间，是说明大工业巩固以来工业发展所经过的多年周期的重要因素之一……
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">(1)</a> 参看查·拜比吉《论机器和工厂的节约》1832年伦敦版第285页。——编者注</div></aside><br>
</>
